<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WalkieTalk</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f12;
    --panel: #13171e;
    --border: #1e2530;
    --green: #00e676;
    --green-dim: #00e67622;
    --green-mid: #00e67644;
    --red: #ff3d57;
    --red-dim: #ff3d5722;
    --amber: #ffb300;
    --text: #c8d6e0;
    --muted: #4a5a6a;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .device {
    width: 340px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: relative;
    box-shadow: 0 0 60px rgba(0,230,118,0.04), 0 24px 60px rgba(0,0,0,0.6);
  }

  /* Top grill detail */
  .grill {
    display: flex;
    gap: 5px;
    justify-content: center;
    margin-bottom: -4px;
  }
  .grill span {
    width: 28px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--green);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .signal-bars {
    display: flex;
    gap: 3px;
    align-items: flex-end;
    height: 18px;
  }
  .signal-bars span {
    width: 5px;
    background: var(--muted);
    border-radius: 2px;
    transition: background 0.3s;
  }
  .signal-bars span:nth-child(1) { height: 5px; }
  .signal-bars span:nth-child(2) { height: 9px; }
  .signal-bars span:nth-child(3) { height: 13px; }
  .signal-bars span:nth-child(4) { height: 18px; }
  .signal-bars.connected span { background: var(--green); }
  .signal-bars.connected span:nth-child(4) { background: var(--muted); }

  /* Display screen */
  .screen {
    background: #080b0e;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 12px;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
    overflow: hidden;
  }
  .screen::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,230,118,0.03) 0%, transparent 60%);
    pointer-events: none;
  }
  .screen-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .screen-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .screen-value { color: var(--green); font-size: 13px; }
  .screen-value.amber { color: var(--amber); }
  .screen-value.red { color: var(--red); }
  .screen-divider { height: 1px; background: var(--border); }

  /* Status log */
  .log {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    font-family: var(--mono);
    min-height: 14px;
    transition: color 0.3s;
  }
  .log.ok { color: var(--green); }
  .log.warn { color: var(--amber); }
  .log.err { color: var(--red); }

  /* Room input row */
  .input-row {
    display: flex;
    gap: 8px;
  }
  .room-input {
    flex: 1;
    background: #080b0e;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 1px;
  }
  .room-input::placeholder { color: var(--muted); }
  .room-input:focus { border-color: var(--green); }

  .join-btn {
    background: var(--green-dim);
    border: 1px solid var(--green);
    border-radius: 8px;
    color: var(--green);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 14px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: background 0.2s;
  }
  .join-btn:hover { background: var(--green-mid); }
  .join-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* PTT Button */
  .ptt-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .ptt-ring {
    width: 148px;
    height: 148px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s;
    position: relative;
  }
  .ptt-ring::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid transparent;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .ptt-ring.active { border-color: var(--red); }
  .ptt-ring.active::before {
    border-color: var(--red);
    box-shadow: 0 0 24px var(--red-dim);
    animation: pulse-ring 1s ease-in-out infinite;
  }
  .ptt-ring.ready { border-color: var(--green); }

  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 20px var(--red-dim); }
    50% { box-shadow: 0 0 40px rgba(255,61,87,0.35); }
  }

  .ptt-btn {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: none;
    background: #0d1117;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }
  .ptt-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .ptt-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: var(--green-dim);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .ptt-btn.ready::before { opacity: 1; }
  .ptt-btn.active { background: rgba(255,61,87,0.12); transform: scale(0.97); }
  .ptt-btn.active::before { opacity: 0; }

  .ptt-icon {
    width: 32px;
    height: 32px;
    position: relative;
    z-index: 1;
  }
  .ptt-icon circle { transition: fill 0.2s; }
  .ptt-icon path { transition: stroke 0.2s; }

  .ptt-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    position: relative;
    z-index: 1;
    transition: color 0.2s;
  }
  .ptt-btn.ready .ptt-label { color: var(--green); }
  .ptt-btn.active .ptt-label { color: var(--red); }

  /* Volume indicator */
  .vol-bar {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .vol-fill {
    height: 100%;
    width: 0%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.05s;
  }
  .vol-fill.active { background: var(--red); }

  /* Bottom grill */
  .grill-bottom {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
    margin-top: -4px;
  }
  .grill-bottom span {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
  }

  /* Blink animation for TX */
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .blink { animation: blink 0.6s step-start infinite; }
</style>
</head>
<body>

<div class="device">
  <div class="grill">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="header">
    <div class="brand">WT-01</div>
    <div class="signal-bars" id="signalBars">
      <span></span><span></span><span></span><span></span>
    </div>
  </div>

  <div class="screen">
    <div class="screen-row">
      <span class="screen-label">Channel</span>
      <span class="screen-value" id="screenChannel">---</span>
    </div>
    <div class="screen-divider"></div>
    <div class="screen-row">
      <span class="screen-label">Status</span>
      <span class="screen-value amber" id="screenStatus">STANDBY</span>
    </div>
    <div class="screen-row">
      <span class="screen-label">Peer</span>
      <span class="screen-value" id="screenPeer" style="font-size:10px;color:var(--muted)">waiting...</span>
    </div>
    <div class="log" id="logLine">Ready to connect</div>
  </div>

  <div class="input-row">
    <input class="room-input" id="roomInput" placeholder="CHANNEL-01" maxlength="20" />
    <button class="join-btn" id="joinBtn">JOIN</button>
  </div>

  <div class="ptt-wrap">
    <div class="ptt-ring" id="pttRing">
      <button class="ptt-btn" id="pttBtn" disabled>
        <svg class="ptt-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle id="micCircle" cx="16" cy="16" r="15" fill="#1a2030"/>
          <rect x="12" y="8" width="8" height="12" rx="4" fill="none" stroke="#4a5a6a" stroke-width="1.5" id="micBody"/>
          <path d="M10 18c0 3.3 2.7 6 6 6s6-2.7 6-6" stroke="#4a5a6a" stroke-width="1.5" stroke-linecap="round" fill="none" id="micArc"/>
          <line x1="16" y1="24" x2="16" y2="27" stroke="#4a5a6a" stroke-width="1.5" stroke-linecap="round" id="micStand"/>
          <line x1="13" y1="27" x2="19" y2="27" stroke="#4a5a6a" stroke-width="1.5" stroke-linecap="round" id="micBase"/>
        </svg>
        <span class="ptt-label" id="pttLabel">PTT</span>
      </button>
    </div>
    <div class="vol-bar"><div class="vol-fill" id="volFill"></div></div>
  </div>

  <div class="grill-bottom">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const SERVER_URL = 'https://wearied-francisco-abortedly.ngrok-free.dev';  // ← this number

const socket = io(SERVER_URL, { transports: ['websocket'] });

let pc = null;
let localStream = null;
let peerId = null;
let audioCtx = null;
let analyser = null;
let volInterval = null;

// UI refs
const roomInput = document.getElementById('roomInput');
const joinBtn = document.getElementById('joinBtn');
const pttBtn = document.getElementById('pttBtn');
const pttRing = document.getElementById('pttRing');
const pttLabel = document.getElementById('pttLabel');
const logLine = document.getElementById('logLine');
const screenChannel = document.getElementById('screenChannel');
const screenStatus = document.getElementById('screenStatus');
const screenPeer = document.getElementById('screenPeer');
const signalBars = document.getElementById('signalBars');
const volFill = document.getElementById('volFill');
const micBody = document.getElementById('micBody');
const micArc = document.getElementById('micArc');
const micStand = document.getElementById('micStand');
const micBase = document.getElementById('micBase');

function setLog(msg, type = '') {
  logLine.textContent = msg;
  logLine.className = 'log ' + type;
}

function setStatus(text, color) {
  screenStatus.textContent = text;
  screenStatus.style.color = color || 'var(--amber)';
}

function setMicColor(color) {
  [micBody, micArc, micStand, micBase].forEach(el => el.setAttribute('stroke', color));
}

// Socket events
socket.on('connect', () => {
  setLog('Server connected', 'ok');
  signalBars.classList.add('connected');
});

socket.on('disconnect', () => {
  setLog('Server disconnected', 'err');
  signalBars.classList.remove('connected');
  setStatus('OFFLINE', 'var(--red)');
});

socket.on('peer-joined', id => {
  peerId = id;
  screenPeer.textContent = id.slice(0, 8) + '...';
  screenPeer.style.color = 'var(--green)';
  setStatus('LINKED', 'var(--green)');
  setLog('Peer connected — channel open', 'ok');
  pttBtn.disabled = false;
  pttBtn.classList.add('ready');
  pttRing.classList.add('ready');
  setMicColor('var(--green)');
});

socket.on('peer-left', () => {
  peerId = null;
  screenPeer.textContent = 'waiting...';
  screenPeer.style.color = 'var(--muted)';
  setStatus('STANDBY', '');
  setLog('Peer disconnected', 'warn');
  pttBtn.disabled = true;
  pttBtn.classList.remove('ready', 'active');
  pttRing.classList.remove('ready', 'active');
  setMicColor('#4a5a6a');
  stopVolumeMeter();
});

socket.on('signal', async ({ from, data }) => {
  peerId = peerId || from;
  if (!pc) createPeerConnection();
  if (data.sdp) {
    await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
    if (data.sdp.type === 'offer') {
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit('signal', { to: from, data: { sdp: pc.localDescription } });
    }
  } else if (data.candidate) {
    await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
  }
});

// Join room — note: underscore for Python server
joinBtn.onclick = () => {
  const room = roomInput.value.trim().toUpperCase();
  if (!room) return;
  socket.emit('join_room', room);   // ← underscore (Python)
  screenChannel.textContent = room;
  setStatus('SCANNING', 'var(--amber)');
  setLog('Joined channel ' + room, 'ok');
  joinBtn.disabled = true;
  roomInput.disabled = true;
};

// WebRTC
function createPeerConnection() {
  pc = new RTCPeerConnection({
    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
  });
  pc.onicecandidate = e => {
    if (e.candidate) socket.emit('signal', { to: peerId, data: { candidate: e.candidate } });
  };
  pc.ontrack = e => {
    const audio = new Audio();
    audio.srcObject = e.streams[0];
    audio.autoplay = true;
    setLog('Receiving audio...', 'ok');
  };
}

// PTT logic
async function startTalking() {
  if (!peerId || pttBtn.disabled) return;
  pttBtn.classList.add('active');
  pttBtn.classList.remove('ready');
  pttRing.classList.add('active');
  pttRing.classList.remove('ready');
  pttLabel.textContent = 'TX';
  pttLabel.classList.add('blink');
  setStatus('TRANSMIT', 'var(--red)');
  setLog('Transmitting...', 'err');

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    if (!pc) createPeerConnection();
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    startVolumeMeter(localStream);

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit('signal', { to: peerId, data: { sdp: pc.localDescription } });
  } catch (err) {
    setLog('Mic error: ' + err.message, 'err');
    stopTalking();
  }
}

function stopTalking() {
  pttBtn.classList.remove('active');
  pttBtn.classList.add('ready');
  pttRing.classList.remove('active');
  pttRing.classList.add('ready');
  pttLabel.textContent = 'PTT';
  pttLabel.classList.remove('blink');
  setStatus('LINKED', 'var(--green)');
  setLog('Standing by', 'ok');
  localStream?.getTracks().forEach(t => t.stop());
  localStream = null;
  stopVolumeMeter();
}

// Volume meter
function startVolumeMeter(stream) {
  audioCtx = new AudioContext();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  const src = audioCtx.createMediaStreamSource(stream);
  src.connect(analyser);
  const data = new Uint8Array(analyser.frequencyBinCount);
  volFill.classList.add('active');
  volInterval = setInterval(() => {
    analyser.getByteFrequencyData(data);
    const avg = data.reduce((a, b) => a + b, 0) / data.length;
    volFill.style.width = Math.min(100, avg * 2.5) + '%';
  }, 50);
}

function stopVolumeMeter() {
  clearInterval(volInterval);
  audioCtx?.close();
  audioCtx = null;
  volFill.style.width = '0%';
  volFill.classList.remove('active');
}

// PTT button events (mouse + touch)
pttBtn.addEventListener('mousedown', startTalking);
pttBtn.addEventListener('mouseup', stopTalking);
pttBtn.addEventListener('mouseleave', stopTalking);
pttBtn.addEventListener('touchstart', e => { e.preventDefault(); startTalking(); });
pttBtn.addEventListener('touchend', e => { e.preventDefault(); stopTalking(); });

// Keyboard shortcut: hold Space to talk
document.addEventListener('keydown', e => { if (e.code === 'Space' && !e.repeat) startTalking(); });
document.addEventListener('keyup', e => { if (e.code === 'Space') stopTalking(); });

// Uppercase room input
roomInput.addEventListener('input', () => {
  roomInput.value = roomInput.value.toUpperCase();
});
</script>
</body>
</html>
