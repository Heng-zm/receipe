<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>WalkieTalk</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000;
    --white: #fff;
    --dim: rgba(255,255,255,0.35);
    --dimmer: rgba(255,255,255,0.12);
    --ring: rgba(255,255,255,0.9);
    --green: #30d158;
    --red: #ff453a;
    --amber: #ffd60a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    width: 100%; height: 100dvh;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    padding: env(safe-area-inset-top, 48px) 0 env(safe-area-inset-bottom, 24px);
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px 0;
  }
  .topbar-left { display: flex; flex-direction: column; gap: 3px; }
  .user-handle {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: -0.5px;
  }
  .user-location {
    font-size: 13px;
    color: var(--dim);
    font-weight: 300;
  }
  .power-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1.5px solid var(--dimmer);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .power-btn:active { background: var(--dimmer); }

  /* Channel bar */
  .channel-bar {
    display: flex;
    justify-content: center;
    padding: 14px 24px 0;
  }
  .channel-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--dimmer);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 100px;
    padding: 7px 16px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .channel-pill:active { background: rgba(255,255,255,0.18); }
  .channel-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--dim);
    flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .channel-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .channel-dot.tx { background: var(--red); box-shadow: 0 0 8px var(--red); animation: dotblink 0.5s ease-in-out infinite alternate; }
  @keyframes dotblink { to { opacity: 0.3; } }

  .channel-name {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 1.5px;
    color: var(--white);
    min-width: 80px;
    text-align: center;
  }
  .channel-name.ph { color: var(--dim); }

  /* Center PTT */
  .center {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Ripple rings */
  .ripples {
    position: absolute;
    width: 270px; height: 270px;
    border-radius: 50%;
    pointer-events: none;
  }
  .ripple {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.18);
    opacity: 0;
  }
  .ripples.active .ripple:nth-child(1) { animation: ripout 2s ease-out infinite 0s; }
  .ripples.active .ripple:nth-child(2) { animation: ripout 2s ease-out infinite 0.55s; }
  .ripples.active .ripple:nth-child(3) { animation: ripout 2s ease-out infinite 1.1s; }
  @keyframes ripout {
    0%   { transform: scale(1);   opacity: 0.45; }
    100% { transform: scale(2.1); opacity: 0; }
  }

  /* PTT circle */
  .ptt-outer {
    width: 270px; height: 270px;
    border-radius: 50%;
    border: 1.5px solid var(--ring);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    -webkit-user-select: none; user-select: none;
    touch-action: none;
    position: relative;
    transition: border-color 0.2s;
  }
  .ptt-outer.disabled { border-color: rgba(255,255,255,0.18); cursor: default; }
  .ptt-outer.tx       { border-color: var(--red); }

  .ptt-inner {
    width: 228px; height: 228px;
    border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    background: transparent;
    transition: background 0.15s;
    pointer-events: none;
  }
  .ptt-outer.tx .ptt-inner { background: rgba(255,69,58,0.07); }
  .ptt-outer.disabled .mic-icon { opacity: 0.2; }
  .mic-icon { transition: opacity 0.2s; }

  .ptt-hint {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--dim);
    transition: color 0.2s;
  }
  .ptt-outer.disabled .ptt-hint { opacity: 0.25; }
  .ptt-outer.tx .ptt-hint { color: var(--red); }

  /* Bottom */
  .bottombar {
    display: flex; flex-direction: column;
    align-items: center; gap: 12px;
    padding: 0 24px 8px;
  }

  /* Waveform */
  .waveform {
    display: flex; align-items: center;
    justify-content: center; gap: 3px;
    height: 28px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .waveform.on { opacity: 1; }
  .wbar {
    width: 3px; height: 4px;
    background: var(--red);
    border-radius: 2px;
    transition: height 0.04s;
  }

  .status-line {
    font-size: 13px;
    font-weight: 300;
    color: var(--dim);
    letter-spacing: 0.3px;
    text-align: center;
    min-height: 18px;
    transition: color 0.3s;
  }
  .status-line.ok   { color: var(--green); }
  .status-line.err  { color: var(--red); }
  .status-line.warn { color: var(--amber); }

  /* Bottom sheet overlay */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex; align-items: flex-end;
    z-index: 50;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .sheet {
    width: 100%;
    background: #1c1c1e;
    border-radius: 20px 20px 0 0;
    padding: 16px 24px calc(env(safe-area-inset-bottom, 0px) + 32px);
    display: flex; flex-direction: column; gap: 14px;
    transform: translateY(100%);
    transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
  }
  .overlay.open .sheet { transform: translateY(0); }

  .sheet-handle {
    width: 36px; height: 4px;
    background: rgba(255,255,255,0.18);
    border-radius: 2px;
    margin: 0 auto 6px;
  }
  .sheet-title {
    font-size: 17px; font-weight: 500;
    text-align: center;
  }
  .sheet-input {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: 20px; letter-spacing: 3px;
    padding: 16px; outline: none;
    text-transform: uppercase;
    width: 100%; text-align: center;
    transition: border-color 0.2s;
  }
  .sheet-input::placeholder { color: rgba(255,255,255,0.18); }
  .sheet-input:focus { border-color: rgba(255,255,255,0.35); }
  .sheet-join {
    background: var(--white); border: none;
    border-radius: 12px; color: #000;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px; font-weight: 500;
    padding: 16px; cursor: pointer;
    transition: opacity 0.15s;
  }
  .sheet-join:active { opacity: 0.75; }
  .sheet-cancel {
    background: transparent; border: none;
    color: var(--dim); font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; text-align: center; padding: 4px;
  }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="topbar-left">
      <div class="user-handle" id="userHandle">@loading</div>
      <div class="user-location" id="userLocation">Connecting...</div>
    </div>
    <button class="power-btn" onclick="openSheet()" title="Join channel">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round">
        <path d="M8 1v5M5.1 2.9A6 6 0 1 0 10.9 2.9"/>
      </svg>
    </button>
  </div>

  <div class="channel-bar">
    <div class="channel-pill" onclick="openSheet()">
      <span class="channel-dot" id="channelDot"></span>
      <span class="channel-name ph" id="channelName">TAP TO JOIN</span>
    </div>
  </div>

  <div class="center">
    <div class="ripples" id="ripples">
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
    </div>
    <div class="ptt-outer disabled" id="pttBtn">
      <div class="ptt-inner">
        <svg class="mic-icon" width="52" height="52" viewBox="0 0 52 52" fill="none">
          <rect x="19" y="6" width="14" height="22" rx="7" stroke="white" stroke-width="1.8" fill="none"/>
          <path d="M10 28c0 8.8 7.2 16 16 16s16-7.2 16-16" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none"/>
          <line x1="26" y1="44" x2="26" y2="50" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="19" y1="50" x2="33" y2="50" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <span class="ptt-hint" id="pttHint">HOLD TO TALK</span>
      </div>
    </div>
  </div>

  <div class="bottombar">
    <div class="waveform" id="waveform">
      <div class="wbar" id="b1"></div><div class="wbar" id="b2"></div>
      <div class="wbar" id="b3"></div><div class="wbar" id="b4"></div>
      <div class="wbar" id="b5"></div><div class="wbar" id="b6"></div>
      <div class="wbar" id="b7"></div><div class="wbar" id="b8"></div>
      <div class="wbar" id="b9"></div><div class="wbar" id="b10"></div>
      <div class="wbar" id="b11"></div><div class="wbar" id="b12"></div>
    </div>
    <div class="status-line" id="statusLine">Tap channel to get started</div>
  </div>
</div>

<!-- Bottom sheet -->
<div class="overlay" id="overlay" onclick="bgClose(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Join a Channel</div>
    <input class="sheet-input" id="sheetInput" placeholder="CHANNEL-01" maxlength="20" autocomplete="off" spellcheck="false"/>
    <button class="sheet-join" onclick="joinChannel()">Join</button>
    <button class="sheet-cancel" onclick="closeSheet()">Cancel</button>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const SERVER_URL = 'http://localhost:3000';
const socket = io(SERVER_URL, { transports: ['websocket'] });

let pc = null, localStream = null, peerId = null;
let audioCtx = null, analyser = null, volInterval = null, talking = false;

// Random handle
const adj  = ['swift','clear','brave','calm','sharp','quiet','bold','keen'];
const noun = ['wave','link','beam','echo','pulse','relay','freq','node'];
document.getElementById('userHandle').textContent =
  '@' + adj[Math.random()*8|0] + noun[Math.random()*8|0];

const pttBtn    = document.getElementById('pttBtn');
const pttHint   = document.getElementById('pttHint');
const channelDot= document.getElementById('channelDot');
const channelName=document.getElementById('channelName');
const statusLine= document.getElementById('statusLine');
const userLoc   = document.getElementById('userLocation');
const ripples   = document.getElementById('ripples');
const waveform  = document.getElementById('waveform');
const bars      = Array.from({length:12},(_,i)=>document.getElementById('b'+(i+1)));

const setStatus = (msg, cls='') => { statusLine.textContent=msg; statusLine.className='status-line '+cls; };

// Sheet
function openSheet()  { document.getElementById('overlay').classList.add('open'); setTimeout(()=>document.getElementById('sheetInput').focus(),100); }
function closeSheet() { document.getElementById('overlay').classList.remove('open'); }
function bgClose(e)   { if(e.target===document.getElementById('overlay')) closeSheet(); }
document.getElementById('sheetInput').oninput = e => e.target.value = e.target.value.toUpperCase();
document.getElementById('sheetInput').onkeydown = e => { if(e.key==='Enter') joinChannel(); };

function joinChannel() {
  const room = document.getElementById('sheetInput').value.trim();
  if (!room) return;
  socket.emit('join_room', room);
  channelName.textContent = room;
  channelName.classList.remove('ph');
  channelDot.className = 'channel-dot';
  setStatus('Scanning for peers...', 'warn');
  closeSheet();
}

// Socket events
socket.on('connect',    () => { userLoc.textContent = 'Connected'; setStatus('Ready — tap channel to join'); });
socket.on('disconnect', () => { userLoc.textContent = 'Disconnected'; setStatus('Connection lost','err'); channelDot.className='channel-dot'; pttBtn.classList.add('disabled'); peerId=null; });

socket.on('peer-joined', id => {
  peerId = id;
  channelDot.className = 'channel-dot online';
  userLoc.textContent = 'Peer online';
  setStatus('Channel open — hold to transmit','ok');
  pttBtn.classList.remove('disabled');
});

socket.on('peer-left', () => {
  peerId = null;
  channelDot.className = 'channel-dot';
  userLoc.textContent = 'Waiting for peer...';
  setStatus('Peer disconnected','warn');
  pttBtn.classList.add('disabled');
  endTalk();
});

socket.on('signal', async ({ from, data }) => {
  peerId = peerId || from;
  if (!pc) initPC();
  if (data.sdp) {
    await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
    if (data.sdp.type === 'offer') {
      const ans = await pc.createAnswer();
      await pc.setLocalDescription(ans);
      socket.emit('signal', { to: from, data: { sdp: pc.localDescription } });
    }
  } else if (data.candidate) {
    await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
  }
});

function initPC() {
  pc = new RTCPeerConnection({ iceServers:[{urls:'stun:stun.l.google.com:19302'}] });
  pc.onicecandidate = e => { if(e.candidate) socket.emit('signal',{to:peerId,data:{candidate:e.candidate}}); };
  pc.ontrack = e => { const a=new Audio(); a.srcObject=e.streams[0]; a.autoplay=true; setStatus('Receiving...','ok'); };
}

async function startTalk() {
  if (pttBtn.classList.contains('disabled') || talking) return;
  talking = true;
  pttBtn.classList.add('tx');
  pttHint.textContent = 'TRANSMITTING';
  channelDot.className = 'channel-dot tx';
  ripples.classList.add('active');
  waveform.classList.add('on');
  setStatus('Transmitting...','err');
  try {
    localStream = await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    if (!pc) initPC();
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
    startVol(localStream);
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit('signal', { to: peerId, data: { sdp: pc.localDescription } });
  } catch(err) {
    setStatus('Mic: '+err.message,'err');
    endTalk();
  }
}

function endTalk() {
  if (!talking) return;
  talking = false;
  pttBtn.classList.remove('tx');
  pttHint.textContent = 'HOLD TO TALK';
  if (peerId) channelDot.className = 'channel-dot online';
  ripples.classList.remove('active');
  waveform.classList.remove('on');
  localStream?.getTracks().forEach(t=>t.stop()); localStream=null;
  stopVol();
  if (peerId) setStatus('Channel open — hold to transmit','ok');
}

function startVol(stream) {
  audioCtx = new AudioContext(); analyser = audioCtx.createAnalyser(); analyser.fftSize=64;
  audioCtx.createMediaStreamSource(stream).connect(analyser);
  const d = new Uint8Array(analyser.frequencyBinCount);
  volInterval = setInterval(()=>{
    analyser.getByteFrequencyData(d);
    bars.forEach((b,i)=>{ const v=d[i*2]||0; b.style.height=Math.max(4,Math.min(24,v*0.22))+'px'; });
  },40);
}
function stopVol() { clearInterval(volInterval); audioCtx?.close(); audioCtx=null; bars.forEach(b=>b.style.height='4px'); }

// Events
pttBtn.addEventListener('mousedown',  startTalk);
pttBtn.addEventListener('mouseup',    endTalk);
pttBtn.addEventListener('mouseleave', endTalk);
pttBtn.addEventListener('touchstart', e=>{e.preventDefault();startTalk();},{passive:false});
pttBtn.addEventListener('touchend',   e=>{e.preventDefault();endTalk();},  {passive:false});
pttBtn.addEventListener('touchcancel',e=>{e.preventDefault();endTalk();},  {passive:false});
document.addEventListener('keydown',  e=>{if(e.code==='Space'&&!e.repeat)startTalk();});
document.addEventListener('keyup',    e=>{if(e.code==='Space')endTalk();});
</script>
</body>
</html>
