<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>WalkieTalk</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000;
    --white: #fff;
    --dim: rgba(255,255,255,0.35);
    --dimmer: rgba(255,255,255,0.12);
    --green: #30d158;
    --red: #ff453a;
    --amber: #ffd60a;
    --blue: #0a84ff;
  }

  *, *::before, *::after {
    box-sizing: border-box; margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg); color: var(--white);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden; -webkit-font-smoothing: antialiased;
  }
  .app {
    width: 100%; height: 100dvh;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    padding: env(safe-area-inset-top, 48px) 0 env(safe-area-inset-bottom, 24px);
  }

  /* Topbar */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px 0;
  }
  .topbar-left { display: flex; flex-direction: column; gap: 3px; }
  .user-handle {
    font-family: 'DM Mono', monospace;
    font-size: 22px; font-weight: 400; letter-spacing: -0.5px;
  }
  .user-location { font-size: 13px; color: var(--dim); font-weight: 300; }
  .settings-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1.5px solid var(--dimmer); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .settings-btn:active { background: var(--dimmer); }

  /* Channel bar */
  .channel-bar { display: flex; justify-content: center; padding: 14px 24px 0; }
  .channel-pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--dimmer); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 100px; padding: 7px 16px;
    cursor: pointer; transition: background 0.15s;
  }
  .channel-pill:active { background: rgba(255,255,255,0.18); }
  .channel-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--dim); flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .channel-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .channel-dot.rec    { background: var(--red);   box-shadow: 0 0 8px var(--red); animation: dotblink 0.5s ease-in-out infinite alternate; }
  .channel-dot.send   { background: var(--blue);  box-shadow: 0 0 8px var(--blue); }
  @keyframes dotblink { to { opacity: 0.3; } }
  .channel-name {
    font-family: 'DM Mono', monospace; font-size: 13px;
    letter-spacing: 1.5px; color: var(--white);
    min-width: 80px; text-align: center;
  }
  .channel-name.ph { color: var(--dim); }

  /* Center PTT */
  .center {
    display: flex; align-items: center; justify-content: center; position: relative;
  }

  /* Cancel hint — shows while recording */
  .cancel-hint {
    position: absolute; top: -28px;
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--red); opacity: 0; transition: opacity 0.2s;
    pointer-events: none;
  }
  .cancel-hint.on { opacity: 1; }

  /* Ripples */
  .ripples {
    position: absolute; width: 270px; height: 270px;
    border-radius: 50%; pointer-events: none;
  }
  .ripple {
    position: absolute; inset: 0; border-radius: 50%;
    border: 1px solid rgba(255,69,58,0.4); opacity: 0;
  }
  .ripples.rec .ripple:nth-child(1) { animation: ripout 1.5s ease-out infinite 0s; }
  .ripples.rec .ripple:nth-child(2) { animation: ripout 1.5s ease-out infinite 0.5s; }
  .ripples.rec .ripple:nth-child(3) { animation: ripout 1.5s ease-out infinite 1s; }
  @keyframes ripout {
    0%   { transform: scale(1);   opacity: 0.5; }
    100% { transform: scale(2.1); opacity: 0; }
  }

  /* PTT circle */
  .ptt-outer {
    width: 270px; height: 270px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.9);
    display: flex; align-items: center; justify-content: center;
    position: relative; transition: border-color 0.2s, transform 0.15s;
    cursor: pointer;
    -webkit-user-select: none; user-select: none; touch-action: none;
  }
  .ptt-outer.disabled { border-color: rgba(255,255,255,0.18); cursor: default; }
  .ptt-outer.rec      { border-color: var(--red); transform: scale(1.03); }
  .ptt-outer.sending  { border-color: var(--blue); }
  .ptt-outer.cancelling { border-color: var(--amber); transform: scale(0.96); }

  .ptt-inner {
    width: 228px; height: 228px; border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    background: transparent; transition: background 0.2s; pointer-events: none;
  }
  .ptt-outer.rec       .ptt-inner { background: rgba(255,69,58,0.08); }
  .ptt-outer.sending   .ptt-inner { background: rgba(10,132,255,0.08); }
  .ptt-outer.cancelling .ptt-inner { background: rgba(255,214,10,0.08); }

  .ptt-icon { transition: opacity 0.2s; }
  .ptt-outer.disabled .ptt-icon { opacity: 0.2; }

  .ptt-label {
    font-size: 11px; font-weight: 300; letter-spacing: 2.5px;
    text-transform: uppercase; color: var(--dim); transition: color 0.2s;
  }
  .ptt-outer.disabled   .ptt-label { opacity: 0.25; }
  .ptt-outer.rec        .ptt-label { color: var(--red); }
  .ptt-outer.sending    .ptt-label { color: var(--blue); }
  .ptt-outer.cancelling .ptt-label { color: var(--amber); }

  /* Recording timer inside circle */
  .rec-timer {
    position: absolute; top: 18px;
    font-family: 'DM Mono', monospace; font-size: 13px;
    color: var(--red); letter-spacing: 2px;
    opacity: 0; transition: opacity 0.2s;
  }
  .ptt-outer.rec .rec-timer { opacity: 1; }
  .ptt-outer.cancelling .rec-timer { color: var(--amber); opacity: 1; }

  /* Bottombar */
  .bottombar {
    display: flex; flex-direction: column;
    align-items: center; gap: 8px; padding: 0 16px 8px;
  }

  /* Waveform */
  .waveform {
    display: flex; align-items: center;
    justify-content: center; gap: 3px;
    height: 28px; opacity: 0; transition: opacity 0.3s;
  }
  .waveform.on { opacity: 1; }
  .wbar { width: 3px; height: 4px; background: var(--red); border-radius: 2px; transition: height 0.04s; }

  /* Message log */
  .msg-log {
    width: 100%;
    max-height: 160px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 4px 4px;
    -webkit-overflow-scrolling: touch;
  }
  .msg-log::-webkit-scrollbar { display: none; }

  .msg-row {
    display: flex; align-items: flex-end; gap: 8px;
    animation: fadeup 0.25s ease;
    flex-shrink: 0;
  }
  @keyframes fadeup { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .msg-row.me   { justify-content: flex-end; }
  .msg-row.them { justify-content: flex-start; }

  .msg-bubble {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 14px; border-radius: 20px;
    cursor: pointer; max-width: 240px;
    transition: opacity 0.15s; position: relative;
  }
  .msg-bubble:active { opacity: 0.75; }
  .msg-row.me   .msg-bubble { background: var(--blue); border-radius: 18px 18px 4px 18px; }
  .msg-row.them .msg-bubble { background: rgba(255,255,255,0.13); border-radius: 18px 18px 18px 4px; }

  /* Play/stop icon */
  .msg-play-btn {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.15s;
  }
  .msg-play-btn:hover { background: rgba(255,255,255,0.3); }

  .msg-info { display: flex; flex-direction: column; gap: 4px; }
  .msg-duration {
    font-family: 'DM Mono', monospace; font-size: 12px;
    color: rgba(255,255,255,0.9); letter-spacing: 1px;
  }
  .msg-progress {
    width: 90px; height: 3px; background: rgba(255,255,255,0.2);
    border-radius: 2px; overflow: hidden;
  }
  .msg-progress-fill {
    height: 100%; width: 0%;
    background: rgba(255,255,255,0.85);
    border-radius: 2px; transition: width 0.08s linear;
  }
  .msg-time {
    font-size: 10px; color: rgba(255,255,255,0.4);
    letter-spacing: 0.5px; align-self: flex-end;
    margin-bottom: 2px; white-space: nowrap;
  }

  /* Unread dot on channel pill */
  .unread-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--red); border: 1.5px solid #000;
    position: absolute; top: -2px; right: -2px;
    opacity: 0; transition: opacity 0.2s;
  }
  .channel-pill { position: relative; }
  .channel-pill.has-unread .unread-dot { opacity: 1; }

  /* Status line */
  .status-line {
    font-size: 13px; font-weight: 300; color: var(--dim);
    letter-spacing: 0.3px; text-align: center;
    min-height: 18px; transition: color 0.3s;
  }
  .status-line.ok   { color: var(--green); }
  .status-line.err  { color: var(--red); }
  .status-line.warn { color: var(--amber); }

  /* Bottom sheet */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    display: flex; align-items: flex-end; z-index: 50;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }
  .sheet {
    width: 100%; background: #1c1c1e;
    border-radius: 20px 20px 0 0;
    padding: 16px 24px 40px;
    display: flex; flex-direction: column; gap: 14px;
    transform: translateY(100%);
    transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
  }
  .overlay.open .sheet { transform: translateY(0); }
  .sheet-handle {
    width: 36px; height: 4px; background: rgba(255,255,255,0.18);
    border-radius: 2px; margin: 0 auto 6px;
  }
  .sheet-title { font-size: 17px; font-weight: 500; text-align: center; }
  .sheet-input {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; color: var(--white);
    font-family: 'DM Mono', monospace; font-size: 20px; letter-spacing: 3px;
    padding: 16px; outline: none; text-transform: uppercase;
    width: 100%; text-align: center; transition: border-color 0.2s;
  }
  .sheet-input::placeholder { color: rgba(255,255,255,0.18); }
  .sheet-input:focus { border-color: rgba(255,255,255,0.35); }
  .sheet-join {
    background: var(--white); border: none; border-radius: 12px; color: #000;
    font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 500;
    padding: 16px; cursor: pointer; transition: opacity 0.15s;
  }
  .sheet-join:active { opacity: 0.75; }
  .sheet-cancel {
    background: transparent; border: none; color: var(--dim);
    font-size: 15px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; text-align: center; padding: 4px;
  }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="topbar-left">
      <div class="user-handle" id="userHandle">@loading</div>
      <div class="user-location" id="userLocation">Connecting...</div>
    </div>
    <button class="settings-btn" id="settingsBtn" title="Join channel">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round">
        <path d="M8 1v5M5.1 2.9A6 6 0 1 0 10.9 2.9"/>
      </svg>
    </button>
  </div>

  <div class="channel-bar">
    <div class="channel-pill" id="channelPill">
      <span class="unread-dot" id="unreadDot"></span>
      <span class="channel-dot" id="channelDot"></span>
      <span class="channel-name ph" id="channelName">TAP TO JOIN</span>
    </div>
  </div>

  <div class="center">
    <div class="cancel-hint" id="cancelHint">SLIDE UP TO CANCEL</div>
    <div class="ripples" id="ripples">
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
    </div>
    <div class="ptt-outer disabled" id="pttBtn">
      <div class="ptt-inner">
        <svg class="ptt-icon" width="52" height="52" viewBox="0 0 52 52" fill="none">
          <rect x="19" y="6" width="14" height="22" rx="7" stroke="white" stroke-width="1.8" fill="none"/>
          <path d="M10 28c0 8.8 7.2 16 16 16s16-7.2 16-16" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none"/>
          <line x1="26" y1="44" x2="26" y2="50" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="19" y1="50" x2="33" y2="50" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <span class="ptt-label" id="pttLabel">HOLD TO RECORD</span>
      </div>
      <span class="rec-timer" id="recTimer">0:00</span>
    </div>
  </div>

  <div class="bottombar">
    <div class="waveform" id="waveform">
      <div class="wbar" id="w1"></div><div class="wbar" id="w2"></div>
      <div class="wbar" id="w3"></div><div class="wbar" id="w4"></div>
      <div class="wbar" id="w5"></div><div class="wbar" id="w6"></div>
      <div class="wbar" id="w7"></div><div class="wbar" id="w8"></div>
      <div class="wbar" id="w9"></div><div class="wbar" id="w10"></div>
      <div class="wbar" id="w11"></div><div class="wbar" id="w12"></div>
    </div>
    <div class="msg-log" id="msgLog"></div>
    <div class="status-line" id="statusLine">Tap channel to get started</div>
  </div>

</div>

<!-- Channel sheet -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Join a Channel</div>
    <input class="sheet-input" id="sheetInput" placeholder="CHANNEL-01" maxlength="20" autocomplete="off" spellcheck="false"/>
    <button class="sheet-join" id="sheetJoinBtn">Join</button>
    <button class="sheet-cancel" id="sheetCancelBtn">Cancel</button>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
// ── CONFIG ── Update to your deployed server URL
var SERVER_URL = 'https://server-y327.onrender.com';

var socket = io(SERVER_URL, { transports: ['websocket'] });

// State
var peerId        = null;
var mediaRec      = null;
var recChunks     = [];
var recStream     = null;
var recStartTime  = 0;
var recDuration   = 0;
var recInterval   = null;
var isRecording   = false;
var isCancelling  = false;
var audioCtx      = null;
var analyser      = null;
var volInterval   = null;
var currentAudio  = null;   // currently playing Audio object
var touchStartY   = 0;
var MIN_REC_MS    = 500;    // ignore taps shorter than 500ms

// Notification sound (short beep via Web Audio)
function playBeep(freq, dur) {
  try {
    var ctx = new AudioContext();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur);
    osc.onended = function() { ctx.close(); };
  } catch(e) {}
}

// Random handle
var adj  = ['swift','clear','brave','calm','sharp','quiet','bold','keen'];
var noun = ['wave','link','beam','echo','pulse','relay','freq','node'];
document.getElementById('userHandle').textContent =
  '@' + adj[Math.floor(Math.random() * 8)] + noun[Math.floor(Math.random() * 8)];

// DOM refs
var pttBtn      = document.getElementById('pttBtn');
var pttLabel    = document.getElementById('pttLabel');
var channelDot  = document.getElementById('channelDot');
var channelName = document.getElementById('channelName');
var channelPill = document.getElementById('channelPill');
var statusLine  = document.getElementById('statusLine');
var userLoc     = document.getElementById('userLocation');
var ripples     = document.getElementById('ripples');
var waveform    = document.getElementById('waveform');
var recTimer    = document.getElementById('recTimer');
var msgLog      = document.getElementById('msgLog');
var cancelHint  = document.getElementById('cancelHint');
var overlay     = document.getElementById('overlay');
var sheetInput  = document.getElementById('sheetInput');
var bars        = [];
for (var i = 1; i <= 12; i++) bars.push(document.getElementById('w' + i));

function setStatus(msg, cls) {
  statusLine.textContent = msg;
  statusLine.className = 'status-line' + (cls ? ' ' + cls : '');
}

function nowTime() {
  var d = new Date();
  var h = d.getHours(), m = d.getMinutes();
  return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
}

// ── Sheet ──
function openSheet() { overlay.classList.add('open'); setTimeout(function() { sheetInput.focus(); }, 150); }
function closeSheet() { overlay.classList.remove('open'); }
overlay.addEventListener('click', function(e) { if (e.target === overlay) closeSheet(); });
document.getElementById('sheetCancelBtn').addEventListener('click', closeSheet);
channelPill.addEventListener('click', openSheet);
document.getElementById('settingsBtn').addEventListener('click', openSheet);
sheetInput.addEventListener('input', function() { sheetInput.value = sheetInput.value.toUpperCase(); });
sheetInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') joinChannel(); });
document.getElementById('sheetJoinBtn').addEventListener('click', joinChannel);

function joinChannel() {
  var room = sheetInput.value.trim();
  if (!room) return;
  socket.emit('join_room', room);
  channelName.textContent = room;
  channelName.classList.remove('ph');
  channelDot.className = 'channel-dot';
  setStatus('Scanning for peers...', 'warn');
  closeSheet();
}

// ── Socket events ──
socket.on('connect', function() {
  userLoc.textContent = 'Connected';
  setStatus('Ready - tap channel to join', '');
});

socket.on('disconnect', function() {
  userLoc.textContent = 'Disconnected';
  setStatus('Connection lost', 'err');
  channelDot.className = 'channel-dot';
  pttBtn.classList.add('disabled');
  peerId = null;
  stopRecording(true);
});

socket.on('peer-joined', function(id) {
  peerId = id;
  channelDot.className = 'channel-dot online';
  userLoc.textContent = 'Peer online';
  setStatus('Hold to record, release to send', 'ok');
  pttBtn.classList.remove('disabled');
  playBeep(660, 0.12);
});

socket.on('peer-left', function() {
  peerId = null;
  channelDot.className = 'channel-dot';
  userLoc.textContent = 'Waiting for peer...';
  setStatus('Peer disconnected', 'warn');
  pttBtn.classList.add('disabled');
  stopRecording(true);
  playBeep(300, 0.2);
});

// FIX: event name matches server 'voice_message' underscore
socket.on('voice_message', function(data) {
  var blob = b64toBlob(data.audio, data.mime);
  addMessage(blob, data.duration, false);
  setStatus('New voice message', 'ok');
  channelDot.className = 'channel-dot online';
  channelPill.classList.add('has-unread');
  playBeep(880, 0.08);
});

// ── Recording ──
async function startRecording() {
  if (pttBtn.classList.contains('disabled') || isRecording) return;

  try {
    recStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch(err) {
    setStatus('Mic error: ' + err.message, 'err');
    return;
  }

  recChunks    = [];
  isRecording  = true;
  isCancelling = false;
  recStartTime = Date.now();

  // Pick best supported mime
  var mime = 'audio/webm';
  if (!MediaRecorder.isTypeSupported('audio/webm')) {
    mime = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/ogg';
  }

  mediaRec = new MediaRecorder(recStream, { mimeType: mime });
  mediaRec.ondataavailable = function(e) { if (e.data && e.data.size > 0) recChunks.push(e.data); };
  mediaRec.start(100);

  // UI
  pttBtn.classList.add('rec');
  pttLabel.textContent = 'RECORDING';
  ripples.classList.add('rec');
  waveform.classList.add('on');
  channelDot.className = 'channel-dot rec';
  cancelHint.classList.add('on');
  setStatus('Recording... release to send', 'err');
  playBeep(440, 0.06);

  recInterval = setInterval(function() {
    var elapsed = (Date.now() - recStartTime) / 1000;
    var m = Math.floor(elapsed / 60);
    var s = Math.floor(elapsed % 60);
    recTimer.textContent = m + ':' + (s < 10 ? '0' : '') + s;
  }, 200);

  startVolMeter(recStream);
}

function stopRecording(cancel) {
  if (!isRecording) return;

  var elapsed = Date.now() - recStartTime;
  isRecording = false;

  clearInterval(recInterval);
  recTimer.textContent = '0:00';

  pttBtn.classList.remove('rec', 'sending', 'cancelling');
  pttLabel.textContent = 'HOLD TO RECORD';
  ripples.classList.remove('rec');
  waveform.classList.remove('on');
  cancelHint.classList.remove('on');
  stopVolMeter();

  if (recStream) {
    recStream.getTracks().forEach(function(t) { t.stop(); });
    recStream = null;
  }

  // FIX: capture duration before async mediaRec.onstop fires
  recDuration = elapsed / 1000;

  var shouldCancel = cancel || isCancelling || (elapsed < MIN_REC_MS);

  if (shouldCancel) {
    channelDot.className = peerId ? 'channel-dot online' : 'channel-dot';
    if (elapsed < MIN_REC_MS && !cancel && !isCancelling) {
      setStatus('Hold longer to record', 'warn');
    } else {
      setStatus(peerId ? 'Hold to record, release to send' : 'Waiting for peer...', peerId ? 'ok' : 'warn');
    }
    if (mediaRec && mediaRec.state !== 'inactive') mediaRec.stop();
    return;
  }

  if (!mediaRec) return;

  mediaRec.onstop = function() {
    if (recChunks.length === 0) {
      setStatus('Recording too short', 'warn');
      return;
    }
    var mime = mediaRec.mimeType;
    var blob = new Blob(recChunks, { type: mime });
    recChunks = [];
    sendVoiceMessage(blob, recDuration, mime);
  };

  if (mediaRec.state !== 'inactive') {
    mediaRec.stop();
  }
}

function sendVoiceMessage(blob, duration, mime) {
  pttBtn.classList.add('sending');
  pttLabel.textContent = 'SENDING';
  channelDot.className = 'channel-dot send';
  setStatus('Sending...', '');

  var reader = new FileReader();
  reader.onload = function() {
    var b64 = reader.result.split(',')[1];
    // FIX: event name matches server handler 'voice_message' (underscore)
    socket.emit('voice_message', {
      to:       peerId,
      audio:    b64,
      mime:     mime,
      duration: Math.round(duration * 10) / 10
    });
    addMessage(blob, duration, true);
    pttBtn.classList.remove('sending');
    pttLabel.textContent = 'HOLD TO RECORD';
    channelDot.className = 'channel-dot online';
    setStatus('Sent!', 'ok');
    setTimeout(function() {
      if (!isRecording) setStatus('Hold to record, release to send', 'ok');
    }, 1500);
  };
  reader.onerror = function() {
    setStatus('Send failed', 'err');
    pttBtn.classList.remove('sending');
    pttLabel.textContent = 'HOLD TO RECORD';
    channelDot.className = 'channel-dot online';
  };
  reader.readAsDataURL(blob);
}

// ── Message log ──
var activeAudios = [];

function addMessage(blob, duration, isMe) {
  var url  = URL.createObjectURL(blob);
  var dur  = formatDur(duration);
  var time = nowTime();

  var row = document.createElement('div');
  row.className = 'msg-row ' + (isMe ? 'me' : 'them');

  var timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = time;

  var bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  var playBtn = document.createElement('div');
  playBtn.className = 'msg-play-btn';
  playBtn.innerHTML = '<svg width="10" height="12" viewBox="0 0 10 12" fill="white"><polygon points="0,0 10,6 0,12"/></svg>';

  var info = document.createElement('div');
  info.className = 'msg-info';
  info.innerHTML =
    '<div class="msg-duration">' + dur + '</div>' +
    '<div class="msg-progress"><div class="msg-progress-fill"></div></div>';

  bubble.appendChild(playBtn);
  bubble.appendChild(info);

  // FIX: stop any currently playing audio before starting new one
  var audio       = new Audio(url);
  var progFill    = info.querySelector('.msg-progress-fill');
  var progInterval= null;
  var playing     = false;

  function stopThis() {
    audio.pause();
    audio.currentTime = 0;
    clearInterval(progInterval);
    progFill.style.width = '0%';
    playing = false;
    playBtn.innerHTML = '<svg width="10" height="12" viewBox="0 0 10 12" fill="white"><polygon points="0,0 10,6 0,12"/></svg>';
  }

  bubble.addEventListener('click', function() {
    if (playing) { stopThis(); return; }

    // Stop all other playing messages
    activeAudios.forEach(function(fn) { fn(); });

    playing = true;
    activeAudios.push(stopThis);

    playBtn.innerHTML =
      '<svg width="10" height="10" viewBox="0 0 10 10" fill="white">' +
        '<rect x="0" y="0" width="3.5" height="10" rx="1"/>' +
        '<rect x="6.5" y="0" width="3.5" height="10" rx="1"/>' +
      '</svg>';

    audio.play().catch(function() { stopThis(); });

    progInterval = setInterval(function() {
      if (!audio.duration) return;
      progFill.style.width = ((audio.currentTime / audio.duration) * 100) + '%';
    }, 80);

    audio.onended = function() {
      stopThis();
      // FIX: revoke object URL to free memory
      URL.revokeObjectURL(url);
      activeAudios = activeAudios.filter(function(fn) { return fn !== stopThis; });
    };
  });

  if (isMe) {
    row.appendChild(bubble);
    row.appendChild(timeEl);
  } else {
    row.appendChild(timeEl);
    row.appendChild(bubble);
  }

  msgLog.appendChild(row);
  // Auto-scroll to latest
  msgLog.scrollTop = msgLog.scrollHeight;
}

function formatDur(sec) {
  var s = Math.round(sec);
  var m = Math.floor(s / 60);
  var r = s % 60;
  return m + ':' + (r < 10 ? '0' : '') + r;
}

function b64toBlob(b64, mime) {
  var bin = atob(b64);
  var arr = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

// ── Volume meter ──
function startVolMeter(stream) {
  audioCtx = new AudioContext();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 64;
  audioCtx.createMediaStreamSource(stream).connect(analyser);
  var d = new Uint8Array(analyser.frequencyBinCount);
  volInterval = setInterval(function() {
    analyser.getByteFrequencyData(d);
    bars.forEach(function(b, i) {
      var v = d[i * 2] || 0;
      b.style.height = Math.max(4, Math.min(24, v * 0.22)) + 'px';
    });
  }, 40);
}
function stopVolMeter() {
  clearInterval(volInterval);
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  analyser = null;
  bars.forEach(function(b) { b.style.height = '4px'; });
}

// ── PTT: mouse ──
pttBtn.addEventListener('mousedown', function(e) {
  e.preventDefault();
  startRecording();
});
pttBtn.addEventListener('mouseup', function() {
  stopRecording(false);
});
// FIX: don't cancel on mouseleave — only stop (so dragging out still sends)
pttBtn.addEventListener('mouseleave', function() {
  if (isRecording) stopRecording(false);
});

// ── PTT: touch with swipe-up-to-cancel ──
pttBtn.addEventListener('touchstart', function(e) {
  e.preventDefault();
  touchStartY = e.touches[0].clientY;
  startRecording();
}, { passive: false });

pttBtn.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (!isRecording) return;
  var dy = touchStartY - e.touches[0].clientY;
  if (dy > 60) {
    // Swipe up > 60px = cancelling
    if (!isCancelling) {
      isCancelling = true;
      pttBtn.classList.add('cancelling');
      pttBtn.classList.remove('rec');
      pttLabel.textContent = 'RELEASE TO CANCEL';
      ripples.classList.remove('rec');
    }
  } else {
    // Swipe back down = resume recording
    if (isCancelling) {
      isCancelling = false;
      pttBtn.classList.remove('cancelling');
      pttBtn.classList.add('rec');
      pttLabel.textContent = 'RECORDING';
      ripples.classList.add('rec');
    }
  }
}, { passive: false });

pttBtn.addEventListener('touchend', function(e) {
  e.preventDefault();
  stopRecording(false);
}, { passive: false });

pttBtn.addEventListener('touchcancel', function(e) {
  e.preventDefault();
  stopRecording(true);
}, { passive: false });

// ── Space bar ──
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' && !e.repeat) startRecording();
});
document.addEventListener('keyup', function(e) {
  if (e.code === 'Space') stopRecording(false);
});

// ── Clear unread on channel tap ──
channelPill.addEventListener('click', function() {
  channelPill.classList.remove('has-unread');
});
</script>
